aid: distrokid
name: DistroKid
description: >-
  DistroKid is a Brooklyn, New York based digital music distribution
  service founded in 2013 by Philip Kaplan that lets independent musicians
  and labels upload an unlimited number of songs and albums to Spotify,
  Apple Music, Amazon Music, YouTube Music, TikTok, Instagram, Pandora,
  Tidal, Deezer, and dozens of other streaming and download stores for a
  flat annual subscription fee while keeping 100% of their royalties.
  By 2020 the platform was distributing roughly a third of all new music
  released worldwide and serving more than two million artists; Spotify
  and Insight Partners both hold equity stakes following a 2021 valuation
  around $1.3B. Around the core distribution product DistroKid has built
  out a suite of artist services including Teams for automated royalty
  splits, cover-song mechanical licensing, YouTube Content ID
  monetization, DistroVid music-video distribution, Upstream label
  matching, Mixea AI mastering, and DistroKid Direct for fan
  merchandising and pre-orders. The company has historically operated
  without a public developer API — integrations with stores, DSPs, rights
  organizations, and partners are handled through private B2B
  arrangements, and the only public web endpoints exposed under
  distrokid.com/api are unauthenticated pre-save widgets used to drive
  Spotify follow/save campaigns. DistroKid is actively hiring API
  engineers to scale partner and AI-facing integrations, suggesting a
  more formal developer surface may emerge, but as of 2026 there is no
  published OpenAPI specification, SDK, CLI, sandbox, or developer
  portal. Third-party reverse-engineered wrappers such as the unofficial
  Golang `distrogo` library exist but are not endorsed.
